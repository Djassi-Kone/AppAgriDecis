<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AgriDecis Web Application">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="frontagridecis">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  
  <title>AgriDecis Web</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Use system fonts to avoid loading issues -->
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }
    .flutter-loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: inherit;
    }
    .flutter-loader .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #4CAF50;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="flutter-loader">
    <div class="spinner"></div>
    <h2>Chargement d'AgriDecis...</h2>
    <p>Veuillez patienter pendant que l'application se charge</p>
  </div>
  
  <script>
    // Fallback for font loading errors
    window.addEventListener('error', function(e) {
      if (e.message && e.message.includes('font')) {
        console.log('Font loading error - using system fonts');
      }
    }, true);
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
